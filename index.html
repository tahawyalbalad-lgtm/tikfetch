  const h = size;
  const w = Math.round((size * 120) / 105);
  return (
    <svg width={w} height={h} viewBox="0 0 120 105" fill="none" className={className} aria-hidden="true">
      <path d="M 16 14 L 58 14 L 36 40 Z" fill={color} />

      <path d="M 78 40 L 40 56 L 74 72 L 56 96 L 84 68 L 50 54 Z" fill={color} />
    </svg>
  );
}

// Lightweight synthesized UI sounds via Web Audio API — no external audio
// files to fetch/host. Silently no-ops if sound is disabled or unsupported.
function useUiSound(enabled) {
  const ctxRef = useRef(null);

  const getCtx = () => {
    if (!enabled || typeof window === "undefined") return null;
    try {
      if (!ctxRef.current) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctxRef.current = new AC();
      }
      if (ctxRef.current.state === "suspended") {
        ctxRef.current.resume().catch(() => {});
      }
      return ctxRef.current;
    } catch {
      return null;
    }
  };

  const tone = (freq, start, duration, type = "sine", peakGain = 0.05) => {
    const ctx = getCtx();
    if (!ctx) return;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      const t0 = ctx.currentTime + start;
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(peakGain, t0 + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    } catch {
      // Audio graph unavailable mid-call — fail silently, it's decoration only.
    }
  };

  return {
    click: () => tone(720, 0, 0.06, "square", 0.035),
    focus: () => tone(880, 0, 0.07, "sine", 0.02),
    success: () => {
      tone(660, 0, 0.12, "sine", 0.045);
      tone(990, 0.09, 0.18, "sine", 0.045);
    },
    error: () => {
      tone(180, 0, 0.09, "sine", 0.05);
      tone(150, 0.13, 0.12, "sine", 0.05);
    },
  };
}

function TikFetchApp() {
  const [lang, setLang] = useState("en");
  const [view, setView] = useState("idle"); // idle | loading | result | error
  const [activeModal, setActiveModal] = useState(null); // null | "tos" | "privacy" | "dmca"
  const [langModalOpen, setLangModalOpen] = useState(false);
  const [url, setUrl] = useState("");
  const [toast, setToast] = useState(null);
  const [progress, setProgress] = useState(0);
  const [history, setHistory] = useState([]);
  const [soundEnabled, setSoundEnabled] = useState(true);
  const [previewOpen, setPreviewOpen] = useState(false);
  const [errorKind, setErrorKind] = useState("empty"); // "empty" | "invalid"
  const progressTimer = useRef(null);
  const sound = useUiSound(soundEnabled);
  const t = STRINGS[lang];
  const modalKeys = ["tos", "privacy", "dmca"];
  const isValidTikTokUrl = (value) => /^(https?:\/\/)?([\w-]+\.)?tiktok\.com\//i.test(value.trim());

  // Keep <html lang/dir> and document.title in sync with the active language.
  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = t.dir;
    document.title = t.seoTitle;
    const descTag = document.querySelector('meta[name="description"]');
    if (descTag) descTag.setAttribute("content", t.seoDescription);
  }, [lang]);

  // Load recent-links history from this browser only — never sent anywhere.
  useEffect(() => {
    try {
      const saved = window.localStorage.getItem("tikfetch:history");
      if (saved) setHistory(JSON.parse(saved));
    } catch {
      // localStorage unavailable (private mode, etc.) — history just won't persist.
    }
  }, []);

  // If the user already granted clipboard-read permission previously, quietly
  // prefill a TikTok link they have copied — never prompts, never reads otherwise.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        if (!navigator.permissions || !navigator.clipboard) return;
        const status = await navigator.permissions.query({ name: "clipboard-read" });
        if (status.state !== "granted" || cancelled) return;
        const text = await navigator.clipboard.readText();
        if (!cancelled && text && /tiktok\.com/i.test(text)) {
          setUrl(text.trim());
        }
      } catch {
        // Permission API or clipboard read unsupported/denied — silently skip.
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  const showToast = (message) => {
    setToast(message);
    window.clearTimeout(showToast._t);
    showToast._t = window.setTimeout(() => setToast(null), 2600);
  };

  const handlePaste = async () => {
    sound.click();
    try {
      const text = await navigator.clipboard.readText();
      if (!text) {
        showToast(t.pasteEmpty);
        return;
      }
      setUrl(text.trim());
    } catch {
      showToast(t.pasteFail);
    }
  };

  const handleFetch = () => {
    const trimmed = url.trim();
    if (!trimmed) {
      showToast(t.needLink);
      setErrorKind("empty");
      sound.error();
      setView("error");
      return;
    }
    if (!isValidTikTokUrl(trimmed)) {
      setErrorKind("invalid");
      sound.error();
      setView("error");
      return;
    }

    sound.click();
    setView("loading");
    setProgress(0);

    window.clearInterval(progressTimer.current);
    progressTimer.current = window.setInterval(() => {
      setProgress((p) => (p >= 92 ? p : p + Math.max(1, Math.round((100 - p) / 12))));
    }, 120);

    window.setTimeout(() => {
      window.clearInterval(progressTimer.current);
      setProgress(100);
      saveToHistory(trimmed);
      setView("result");
      sound.success();
    }, 1500);
  };

  const handleReset = () => {
    sound.click();
    setUrl("");
    setView("idle");
    setProgress(0);
    window.clearInterval(progressTimer.current);
  };

  const saveToHistory = (link) => {
    setHistory((prev) => {
      const next = [{ url: link, ts: Date.now() }, ...prev.filter((h) => h.url !== link)].slice(0, 5);
      try {
        window.localStorage.setItem("tikfetch:history", JSON.stringify(next));
      } catch {
        // Ignore write failures (storage disabled/full) — UI state still updates.
      }
      return next;
    });
  };

  const clearHistory = () => {
    setHistory([]);
    try {
      window.localStorage.removeItem("tikfetch:history");
    } catch {
      // No-op if storage is unavailable.
    }
  };

  const handleShareLink = async () => {
    sound.click();
    try {
      if (navigator.share) {
        await navigator.share({ title: "TikFetch", url });
      } else {
        await navigator.clipboard.writeText(url);
        showToast(t.shareCopied);
      }
    } catch {
      try {
        await navigator.clipboard.writeText(url);
        showToast(t.shareFail);
      } catch {
        // Both share and clipboard write failed — silently give up.
      }
    }
  };

  // Triggers a genuine browser download of a small local placeholder file —
  // stands in for a real asset until a compliant backend is connected.
  const mockDownload = (filename, content, mime) => {
    sound.click();
    const blob = new Blob([content], { type: mime });
    const href = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = href;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(href);
    showToast(t.mockDownload);
  };

  const isRTL = t.dir === "rtl";

  return (
    <div dir={t.dir} className={`min-h-screen w-full text-white antialiased ${isRTL ? "font-[var(--font-ar)]" : "font-[var(--font-en)]"}`}>
      <div className="bg-noise">
        {/* Top banner ad */}

          <AdSlot label={t.topBanner} size="320×50" wide />
        </div>

        {/* Top bar */}
        <header className="mx-auto flex max-w-md items-center justify-between px-5 pt-6 md:max-w-2xl md:px-8 lg:max-w-4xl">
          <div className="flex items-center gap-2">
            <div className="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-[#8b5cf6] to-[#a855f7] shadow-[0_0_16px_-2px_rgba(168,85,247,0.8)]">
              <TLogo size={16} color="#FFFFFF" />
            </div>
            <span className="font-display text-[15px] font-semibold tracking-tight text-white">TikFetch</span>
          </div>
          <div className="flex items-center gap-2">
            <button
              type="button"
              onClick={() => setSoundEnabled((s) => !s)}
              aria-label={soundEnabled ? t.muteLabel : t.unmuteLabel}
              title={soundEnabled ? t.muteLabel : t.unmuteLabel}
              className="flex h-8 w-8 items-center justify-center rounded-full border border-[#8b5cf6]/20 bg-[#1d1735]/60 text-[#c9bdf0] transition-colors hover:border-[#8b5cf6]/40 hover:text-white"
            >
              {soundEnabled ? <Volume2 size={14} /> : <VolumeX size={14} />}
            </button>
            <button
              type="button"
              onClick={() => setLangModalOpen(true)}
              className="flex items-center gap-1.5 rounded-full border border-[#8b5cf6]/20 bg-[#1d1735]/60 px-3 py-1.5 text-xs text-[#c9bdf0] transition-colors hover:border-[#8b5cf6]/40 hover:text-white"
            >
              <Globe size={13} />
              {lang === "en" ? "EN" : "AR"}
            </button>
          </div>
        </header>

        {/* Hero */}
        <main className="mx-auto max-w-md px-5 pb-16 pt-10 md:max-w-2xl md:px-8 lg:max-w-4xl">
          <div className="mx-auto max-w-md md:max-w-xl">
            <p className="text-[11px] font-medium uppercase tracking-[0.16em] text-[#a855f7]">{t.eyebrow}</p>
            <h1 className="font-display mt-3 whitespace-pre-line text-[34px] font-semibold leading-[1.08] tracking-tight text-white md:text-[44px]">
              {t.heroTitle}
            </h1>
            <p className="mt-3 text-[15px] leading-relaxed text-[#a197c4] md:text-base">{t.heroSub}</p>

            <div className="mt-4 flex flex-wrap gap-2">
              <TrustBadge label={t.trustBadge} />

            {/* Input box */}
            <div className="mt-7">
              <div className="glow-focus flex items-center gap-2 rounded-full border border-[#8b5cf6]/15 bg-[#1d1735]/70 p-2 backdrop-blur-xl transition-all">

                  <Link2 size={16} className="shrink-0 text-[#a197c4]" />
                  <input
                    type="text"
                    value={url}
                    onChange={(e) => setUrl(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && handleFetch()}
                    onFocus={() => sound.focus()}

                    dir="ltr"
                    className="w-full bg-transparent py-2 text-sm text-white placeholder:text-[#a197c4]/50 outline-none"
                  />
                </div>
                {url && (
                  <button
                    type="button"
                    aria-label={t.reset}
                    onClick={handleReset}
                    className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-[#a197c4] transition-colors hover:bg-[#271f45] hover:text-white"
                  >

                <button

                  onClick={handlePaste}

                onClick={handleFetch}
                disabled={view === "loading"}
                className="mt-3 flex w-full items-center justify-center gap-2 rounded-full bg-gradient-to-r from-[#8b5cf6] to-[#a855f7] py-3.5 text-sm font-semibold text-white shadow-[0_0_28px_-6px_rgba(168,85,247,0.75)] transition-all hover:shadow-[0_0_36px_-4px_rgba(168,85,247,0.95)] active:scale-[0.99] disabled:opacity-70"
              >
                {view === "loading" ? <Loader2 size={16} className="animate-spin" /> : <Download size={16} />}
                {view === "loading" ? t.fetching : t.fetch}
              </button>

              {view !== "idle" && (
                <button
                  type="button"
                  onClick={handleReset}
                  className="mt-2 w-full text-center text-xs text-[#a197c4]/70 transition-colors hover:text-white"
                >
                  {t.reset}
                </button>
              )}

              {view === "idle" && (
                <div className="mt-5">
                  <div className="flex items-center gap-1.5 text-[11px] font-medium uppercase tracking-[0.14em] text-[#a197c4]/70">
                    <HistoryIcon size={12} />
                    {t.historyTitle}
                  </div>
                  <HistoryList
                    items={history}
                    onSelect={setUrl}
                    onClear={clearHistory}
                    labels={{ empty: t.historyEmpty, clear: t.historyClear }}
                  />
                </div>
              )}
            </div>

            {/* Ad slot — mid-content, above card */}
            <div className="mt-8">
              <AdSlot label={t.midContent} size="336×280" />
            </div>

            {/* Filmstrip divider */}
            <div className="mt-8">
              <FilmStrip animate={view === "loading"} />
            </div>

            {/* Loading — glowing sphere + real progress bar */}
            {view === "loading" && (
              <div className="mt-6 flex flex-col items-center justify-center gap-3 py-2">
                <GlowSphere size={72} />
                <p className="text-xs font-medium tracking-wide text-[#a197c4]">
                  {t.progressLabel} · {progress}%
                </p>
                <ProgressBar progress={progress} />
              </div>
            )}
            {view === "loading" && <ResultSkeleton />}

            {/* Result card */}
            {view === "result" && (
              <section className="mt-6 overflow-hidden rounded-3xl border border-[#8b5cf6]/15 bg-[#1d1735]/70 backdrop-blur-xl">
                <div className="flex items-center justify-between px-4 pt-4">
                  <p className="text-[11px] font-medium uppercase tracking-[0.14em] text-[#a855f7]">{t.resultEyebrow}</p>
                  <span className="rounded-full bg-[#271f45] px-2.5 py-1 text-[10px] font-medium text-[#c9bdf0]">{t.noWatermark}</span>
                </div>

                <div className="flex gap-3 p-4">
                  <button
                    type="button"
                    onClick={() => {
                      sound.click();
                      setPreviewOpen(true);
                    }}
                    aria-label={t.previewCta}
                    className="relative h-24 w-16 shrink-0 overflow-hidden rounded-2xl text-left transition-transform active:scale-95"
                    style={{ background: "linear-gradient(160deg, #3b2a5e 0%, #271f45 55%, #1a1530 100%)" }}
                  >
                    <div className="flex h-full w-full items-center justify-center">
                      <div className="flex h-7 w-7 items-center justify-center rounded-full bg-black/40 backdrop-blur-sm">
                        <Play size={12} className="translate-x-[1px] fill-white text-white" />
                      </div>
                    </div>
                    <div className="absolute bottom-1 right-1 flex items-center gap-0.5 rounded-full bg-black/60 px-1.5 py-0.5 text-[9px] text-white/80">
                      <Clock size={9} /> 0:38
                    </div>
                  </button>
                  <div className="flex min-w-0 flex-col justify-center gap-1.5">
                    <p className="line-clamp-2 text-sm font-medium leading-snug text-white">
                      Video title / caption placeholder text goes here for preview purposes
                    </p>
                    <p className="flex items-center gap-1 text-xs text-[#a197c4]">
                      <User size={11} />
                      {t.by} @creator.handle
                    </p>
                    <button
                      type="button"
                      onClick={() => {
                        sound.click();
                        setPreviewOpen(true);
                      }}
                      className="flex w-fit items-center gap-1 text-[11px] font-medium text-[#a855f7] transition-colors hover:text-white"
                    >
                      <Eye size={11} />
                      {t.previewCta}
                    </button>
                  </div>
                </div>

                <div className="flex items-center gap-1.5 px-4 pb-3 text-[11px] text-[#a197c4]/70">
                  <Music2 size={11} className="text-[#a855f7]" />
                  {t.audioNote}
                </div>

                <div className="grid grid-cols-2 gap-2 px-4 pb-2 sm:grid-cols-4">
                  <DownloadButton
                    icon={Download}
                    label={t.dlVideoHD}
                    tone="primary"
                    onClick={() => mockDownload("tikfetch-mock-video-hd.txt", "TikFetch mockup — placeholder for HD video file (no real video attached).", "text/plain")}
                  />
                  <DownloadButton
                    icon={Download}
                    label={t.dlVideoSD}
                    tone="secondary"
                    onClick={() => mockDownload("tikfetch-mock-video-sd.txt", "TikFetch mockup — placeholder for SD video file (no real video attached).", "text/plain")}
                  />
                  <DownloadButton
                    icon={Music2}
                    label={t.dlAudio}
                    tone="secondary"
                    onClick={() => mockDownload("tikfetch-mock-audio.txt", "TikFetch mockup — placeholder for MP3 audio file (no real audio attached).", "text/plain")}
                  />
                  <DownloadButton
                    icon={ImageIcon}
                    label={t.dlCover}
                    tone="secondary"
                    onClick={() => mockDownload("tikfetch-mock-cover.txt", "TikFetch mockup — placeholder for cover image file (no real image attached).", "text/plain")}
                  />
                </div>

                <div className="px-4 pb-4">
                  <button
                    type="button"
                    onClick={handleShareLink}
                    className="flex w-full items-center justify-center gap-2 rounded-full border border-[#8b5cf6]/15 bg-transparent py-2.5 text-xs font-medium text-[#a197c4] transition-colors hover:border-[#8b5cf6]/35 hover:text-white"
                  >
                    <Share2 size={13} />
                    {t.share}
                  </button>
                </div>
              </section>
            )}

            {/* Error state */}
            {view === "error" && (
              <div className="mt-6 flex items-start gap-3 rounded-3xl border border-red-400/20 bg-[#1d1735]/60 p-4 shadow-[0_8px_30px_-10px_rgba(239,68,68,0.35)] backdrop-blur-xl">
                <div className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-red-500/15">
                  <AlertTriangle size={16} className="text-red-300" />
                </div>
                <div>
                  <p className="text-sm font-medium text-white">{errorKind === "invalid" ? t.invalidLinkTitle : t.errorTitle}</p>
                  <p className="mt-1 text-xs leading-relaxed text-[#a197c4]">{errorKind === "invalid" ? t.invalidLinkBody : t.errorBody}</p>
                </div>
              </div>
            )}

            {/* Ad slot — bottom */}
            <div className="mt-8">
              <AdSlot label={t.bottomBanner} size="300×250" />
            </div>
          </div>
        </main>

        {/* Footer */}
        <footer className="border-t border-[#8b5cf6]/10 px-5 py-8 md:px-8">
          <div className="mx-auto max-w-md md:max-w-2xl lg:max-w-4xl">
            <div className="flex items-center gap-2">
              <div className="flex h-7 w-7 items-center justify-center rounded-full bg-gradient-to-br from-[#8b5cf6] to-[#a855f7]">
                <TLogo size={14} color="#FFFFFF" />
              </div>
              <span className="font-display text-sm font-semibold text-white">TikFetch</span>
            </div>
            <p className="mt-2 text-xs text-[#a197c4]/70">{t.footerTagline}</p>

            <div className="mt-4 flex flex-wrap gap-x-4 gap-y-2 text-xs text-[#a197c4]">
              {t.footerLinks.map((link, i) => (
                <button
                  key={link}
                  type="button"
                  onClick={() => setActiveModal(modalKeys[i])}
                  className="transition-colors hover:text-white"
                >
                  {link}
                </button>
              ))}
            </div>

            <p className="mt-4 text-[11px] leading-relaxed text-[#a197c4]/50">{t.disclaimer}</p>
          </div>
        </footer>
      </div>

      {langModalOpen && (
        <LanguageModal
          lang={lang}
          onSelect={(code) => {
            setLang(code);
            setLangModalOpen(false);
          }}
          onClose={() => setLangModalOpen(false)}
          labels={{ title: lang === "en" ? "Language" : "اللغة", close: t.close }}
        />
      )}

      {activeModal && (
        <Modal
          title={t.modals[activeModal].title}
          body={t.modals[activeModal].body}
          closeLabel={t.close}
          onClose={() => setActiveModal(null)}
        />
      )}

      {previewOpen && (
        <PreviewModal onClose={() => setPreviewOpen(false)} labels={{ title: t.previewTitle, hint: t.previewHint, close: t.close }} />
      )}

      {toast && <Toast message={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TikFetchApp />);
</script>
</body>
</html>
